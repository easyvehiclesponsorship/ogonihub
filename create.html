<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Nexcent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
:root {
    --primary-green: #4CAF4F;
    --dark-grey: #4D4D4D;
    --light-grey: #F5F7FA;
    --silver: #ABBED1;
}

body {
    margin: 0;
    font-family: 'Inter', 'Roboto', Arial, sans-serif;
    background-color: var(--light-grey);
}
.container { width: 100%; margin: 0 auto;}
header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 18px 10vw; background: #fff; box-shadow: 0 2px 8px rgba(100,100,100,0.03);
}
.logo {
    font-weight: 700; font-size: 1.3rem; text-decoration: none; color: var(--primary-green);
    display: flex; align-items: center; gap: 10px;
}
.logo-icon { width: 34px; height: 34px;}
nav { display: flex; align-items: center;}
.nav-links { display: flex; gap: 28px; list-style: none; margin: 0; padding: 0;}
.nav-links li { display: inline-block;}
.nav-links a { text-decoration: none; color: var(--dark-grey); font-weight: 550; font-size: 1em;
    transition: color 0.18s; padding: 5px 0;}
.nav-links a:hover { color: var(--primary-green);}
.wizard-container {
    display: flex; justify-content: center; padding: 40px 0; background-color: var(--light-grey); min-height: 80vh;
}
.wizard-card {
    background: white; width: 600px; max-width: 96vw; padding: 40px; border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.05);
}
.step-title { color: var(--dark-grey); margin-bottom: 5px;}
.step-subtitle { color: #717171; font-size: 0.9rem; margin-bottom: 30px;}
.progress-container {
    display: flex; justify-content: space-between; position: relative; margin-bottom: 40px;
}
.progress-container::before {
    content: ""; background-color: var(--light-grey);
    position: absolute; top: 50%; left: 0; transform: translateY(-50%);
    height: 4px; width: 100%; z-index: 1;
}
.progress {
    background-color: var(--primary-green); position: absolute; top: 50%; left: 0;
    transform: translateY(-50%); height: 4px; width: 0%; z-index: 1; transition: 0.4s ease;
}
.circle {
    background-color: #fff; color: var(--silver); border-radius: 50%;
    height: 30px; width: 30px; display: flex; align-items: center; justify-content: center;
    border: 3px solid var(--light-grey); z-index: 2; transition: 0.4s ease; font-weight: bold;
}
.circle.active { border-color: var(--primary-green); color: var(--primary-green);}
.input-group { margin-bottom: 20px;}
.row { display: flex; gap: 20px;}
.row .input-group { flex: 1;}
label { display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--dark-grey);}
input, select, textarea {
    width: 100%; padding: 12px; border: 1px solid var(--silver); border-radius: 6px;
    font-family: inherit; box-sizing: border-box; font-size: 1em;
}
input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--primary-green);
}
.tab { display: none;}
.wizard-buttons { display: flex; justify-content: space-between; margin-top: 30px;}
#nextBtn {
    background-color: var(--primary-green); color: white;
    border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-weight: 600;
    transition: background 0.18s;
}
#prevBtn {
    background-color: transparent; color: var(--dark-grey); border: 1px solid var(--silver);
    padding: 12px 24px; border-radius: 6px; cursor: pointer;
}
#nextBtn:disabled {
    background: #8ee395; cursor: not-allowed;
}
#nextBtn:hover:not(:disabled) { background-color: #388E3C;}
#loader-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.29); display: none; align-items: center; justify-content: center; z-index: 3000;
}
.loader {
    border: 5px solid #f3f3f3; border-top: 5px solid var(--primary-green);
    border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
}
@keyframes spin { 100% { transform: rotate(360deg); } }
@media (max-width: 900px) {
    header { padding: 12px 3vw;}
    .wizard-card { padding: 12px;}
}
@media (max-width: 700px) {
    header { flex-direction: column; align-items: flex-start; gap: 15px; padding: 8px 2vw;}
    .nav-links { flex-direction: column; gap: 0; width: 100%; margin-top: 8px;}
    .nav-links li { width: 100%;}
    .nav-links a { display: block; width: 100%; padding: 10px 0; text-align: left; font-size: 1.1em;}
}
    </style>
</head>
<body>
    <!-- Loader overlay -->
    <div id="loader-overlay"><div class="loader"></div></div>

    <div class="container">
        <header>
            <a href="index.html" class="logo">
                <img src="hero-illustration.png" alt="Logo Icon" class="logo-icon">
                OGONI JOB HUB
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </header>
        <main class="wizard-container">
            <div class="wizard-card">
                <div class="progress-container">
                    <div class="progress" id="progress"></div>
                    <div class="circle active">1</div>
                    <div class="circle">2</div>
                    <div class="circle">3</div>
                    <div class="circle">4</div>
                </div>
                <form id="regForm" autocomplete="off" novalidate>
                    <!-- TAB 0: Account Auth Info -->
                    <div class="tab">
                        <h2 class="step-title">Create Account!</h2>
                        <p class="step-subtitle">Please provide your login credentials</p>
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" name="signup_name" placeholder="Enter your full name" required>
                        </div>
                        <div class="input-group">
                            <label>Email</label>
                            <input type="email" name="signup_email" placeholder="Enter your email" autocomplete="username" required>
                        </div>
                        <div class="input-group">
                            <label>Password <span style="font-weight:normal;font-size:.9em;">(Min 6 chars)</span></label>
                            <input type="password" name="signup_password" placeholder="Create password" autocomplete="new-password" minlength="6" required>
                        </div>
                        <div class="input-group">
                            <label>Confirm Password</label>
                            <input type="password" name="signup_password2" placeholder="Retype password" autocomplete="new-password" minlength="6" required>
                        </div>
                    </div>
                    <!-- TAB 1: Personal Details -->
                    <div class="tab">
                        <h2 class="step-title">Personal Details</h2>
                        <p class="step-subtitle">Let's get to know you better</p>
                        <div class="input-group">
                            <label>Date of Birth</label>
                            <input type="date" name="dob" required>
                        </div>
                        <div class="row">
                            <div class="input-group">
                                <label>Gender</label>
                                <select name="gender" required>
                                    <option value="">Select</option>
                                    <option value="male">Male</option>
                                    <option value="female">Female</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Marital Status</label>
                                <select name="marital" required>
                                    <option value="">Select</option>
                                    <option value="single">Single</option>
                                    <option value="married">Married</option>
                                    <option value="divorced">Divorced</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <!-- TAB 2: Location -->
                    <div class="tab">
                        <h2 class="step-title">Location Details</h2>
                        <p class="step-subtitle">Where are you based?</p>
                        <div class="row">
                            <div class="input-group">
                                <label>State</label>
                                <select id="state-select" name="state" required>
                                    <option value="Rivers">Rivers State</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>LGA</label>
                                <select name="lga" required>
                                    <option value="">Select</option>
                                    <option value="Eleme">Eleme LGA</option>
                                    <option value="Gokana">Gokana LGA</option>
                                    <option value="Khana">Khana LGA</option>
                                    <option value="Tai">Tai LGA</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label>Hometown</label>
                            <input type="text" name="hometown" required>
                        </div>
                        <div class="input-group">
                            <label>Current Home Address</label>
                            <input type="text" name="current_addr" required>
                        </div>
                        <div class="input-group">
                            <label>Permanent Home Address</label>
                            <input type="text" name="perm_addr" required>
                        </div>
                    </div>
                    <!-- TAB 3: Professional -->
                    <div class="tab">
                        <h2 class="step-title">Professional Profile</h2>
                        <p class="step-subtitle">Help us match you with opportunities</p>
                        <div class="input-group">
                            <label>Phone Number</label>
                            <input type="tel" name="phone" placeholder="+234..." required pattern="^\+?\d{10,13}$">
                        </div>
                        <div class="input-group">
                            <label>Field of Work</label>
                            <input type="text" name="field" placeholder="e.g. Software Engineering, Marketing" required>
                        </div>
                        <div class="input-group">
                            <label>Working Experience (Years)</label>
                            <input type="number" name="experience" placeholder="e.g. 5" min="0" required>
                        </div>
                        <div class="input-group">
                            <label>Areas of Interest</label>
                            <textarea name="interest" rows="3" required></textarea>
                        </div>
                    </div>
                    <div class="wizard-buttons">
                        <button type="button" id="prevBtn" onclick="nextPrev(-1)">Previous</button>
                        <button type="button" id="nextBtn" onclick="nextPrev(1)">Next Step</button>
                    </div>
                </form>
                <div id="form-error-msg" style="color: #b91010; margin-top: 18px; min-height: 24px; text-align:center; font-size: 0.98em;"></div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // --- Supabase config ---
    const supabaseUrl = "https://prkvtxqhuvfbekapeltm.supabase.co";    
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBya3Z0eHFodXZmYmVrYXBlbHRtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyMDYzMzQsImV4cCI6MjA5Mjc4MjMzNH0.C5e7kPILz52eIQCuwwcg6cNLhA-hqyqRVmit5HR-0J0";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    // Loader
    const loader = document.getElementById("loader-overlay");
    function showLoader() { loader.style.display = "flex"; }
    function hideLoader() { loader.style.display = "none"; }

    let currentTab = 0;
    showTab(currentTab);

    function showTab(n) {
        let tabs = document.getElementsByClassName("tab");
        for (let i = 0; i < tabs.length; i++)
            tabs[i].style.display = "none";
        tabs[n].style.display = "block";
        document.getElementById("prevBtn").style.visibility = n === 0 ? "hidden" : "visible";
        document.getElementById("nextBtn").innerHTML =
            (n === tabs.length - 1) ? "Submit Registration" : "Next Step →";
        updateProgress(n);
        document.getElementById("form-error-msg").textContent = "";
    }

    function validateForm() {
        let tabs = document.getElementsByClassName("tab");
        let inputs = tabs[currentTab].querySelectorAll("input, select, textarea");
        let valid = true, firstInvalid = null, errMsg = '';

        if (currentTab === 0) {
            const name = document.querySelector('input[name="signup_name"]');
            const email = document.querySelector('input[name="signup_email"]');
            const pw1 = document.querySelector('input[name="signup_password"]');
            const pw2 = document.querySelector('input[name="signup_password2"]');
            name.style.borderColor = email.style.borderColor = pw1.style.borderColor = pw2.style.borderColor = '';

            if (name.value.trim() === "") {
                name.style.borderColor = '#b91010'; valid = false;
                if (!firstInvalid) firstInvalid = name;
            }
            if (!/^[^@]+@[^@]+\.[^@]+$/.test(email.value)) {
                email.style.borderColor = '#b91010'; valid = false;
                errMsg = "Please enter a valid email address.";
                if (!firstInvalid) firstInvalid = email;
            }
            if (pw1.value.length < 6) {
                pw1.style.borderColor = '#b91010'; valid = false;
                errMsg = "Password must be at least 6 characters.";
                if (!firstInvalid) firstInvalid = pw1;
            }
            if (pw2.value !== pw1.value || pw2.value === "") {
                pw2.style.borderColor = '#b91010'; valid = false;
                errMsg = "Passwords do not match.";
                if (!firstInvalid) firstInvalid = pw2;
            }
        } else {
            for (let i = 0; i < inputs.length; i++) {
                let el = inputs[i];
                el.style.borderColor = '';
                if (el.hasAttribute('required') && !el.value.trim()) {
                    el.style.borderColor = '#b91010';
                    if (!firstInvalid) firstInvalid = el;
                    valid = false;
                }
                if (currentTab === 3 && el.type === "tel" && el.value && !/^\+?\d{10,13}$/.test(el.value)) {
                    el.style.borderColor = '#b91010';
                    errMsg = "Phone: 10-13 digits, can start with +";
                    if (!firstInvalid) firstInvalid = el;
                    valid = false;
                }
            }
        }
        if (firstInvalid) firstInvalid.focus();
        if (!valid) {
            document.getElementById("form-error-msg").textContent = errMsg || "Please fill all required fields correctly.";
        } else {
            document.getElementById("form-error-msg").textContent = "";
        }
        return valid;
    }

    window.nextPrev = function(n) {
        let tabs = document.getElementsByClassName("tab");
        if (n === 1 && !validateForm()) return;
        tabs[currentTab].style.display = "none";
        currentTab += n;
        if (currentTab >= tabs.length) {
            submitToSupabase();
            return;
        }
        showTab(currentTab);
    };

    async function submitToSupabase() {
        const form = document.getElementById("regForm");
        const nextBtn = document.getElementById("nextBtn");
        const prevBtn = document.getElementById("prevBtn");
        nextBtn.disabled = true; prevBtn.disabled = true; showLoader();

        const name = form.signup_name.value.trim();
        const email = form.signup_email.value.trim();
        const password = form.signup_password.value;
        const data = {
            full_name: name,
            email: email,
            dob: form.dob.value,
            gender: form.gender.value,
            marital: form.marital.value,
            state: form.state ? form.state.value.trim() : (document.getElementById("state-select").value.trim() || ""),
            lga: form.lga.value,
            hometown: form.hometown.value,
            current_addr: form.current_addr.value,
            perm_addr: form.perm_addr.value,
            phone: form.phone.value,
            field: form.field.value,
            experience: parseInt(form.experience.value) || 0,
            interest: form.interest.value.trim(),
        };

        try {
            // 1. Signup user with Supabase Auth (auto-login, no email verification)!
            const { data:user, error:authErr } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: { emailRedirectTo: undefined, data: { full_name: name } }
            });
            if (authErr) throw authErr;
            // 2. Save profile data in 'users' table (must exist!)
            const userId = (user.user?.id) ? user.user.id : (user.id ? user.id : null);
            const profileRes = await supabaseClient
                .from("users")
                .insert([{ ...data, user_id: userId }]);
            if (profileRes.error) throw profileRes.error;
            hideLoader();
            // Save profile in localStorage for dashboard
            localStorage.setItem('ogonijobhub_profile', JSON.stringify({...data, user_id: userId }));
            // 3. Redirect directly to dashboard
            window.location.href = "dashboard.html";
        } catch (err) {
            hideLoader();
            nextBtn.disabled = false; prevBtn.disabled = false;
            document.getElementById("form-error-msg").textContent =
                "Registration failed: " + (err.message || err.error_description || err);
        }
    }

    function updateProgress(n) {
        let circles = document.getElementsByClassName("circle");
        let progress = document.getElementById("progress");
        for (let i = 0; i < circles.length; i++) {
            circles[i].classList.remove("active");
            if (i <= n) circles[i].classList.add("active");
        }
        progress.style.width = (n / (circles.length - 1)) * 100 + "%";
    }
});
</script>
</body>
</html>
